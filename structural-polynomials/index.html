<html lang="en">
<head>
<meta charset="utf-8">

<title>flashpoly</title>
<style>

    --accent: #6ea8fe; --good: #34d399; --bad: #4b5170; --line: #2a3052;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; background: var(--bg); color: var(--ink);
    font: 17px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #app { max-width: 480px; margin: 0 auto; padding: 18px 16px 48px; min-height: 100vh; }

  .hdr { display: flex; justify-content: space-between; align-items: baseline;

  .hdr .pos { font-variant-numeric: tabular-nums; }
  .hdr .score { color: var(--good); font-weight: 700; font-size: 16px;

  .pips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .pip { width: 14px; height: 14px; border-radius: 50%;
    background: var(--bad); border: 1px solid var(--line); }
  .pip.on { background: var(--good); border-color: var(--good); }
  .prompt { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 26px 16px; text-align: center; margin-bottom: 18px; overflow-x: auto; }
  /* prose stems: wrap freely */
  .prompt .stem { font-size: 1.12em; line-height: 1.45; text-align: left;
    overflow-wrap: anywhere; }
  .prompt .stem b { color: var(--accent); }
  /* the factored product / result lines */
  .prompt .polyline { margin: 14px 0 4px; }
  .prompt .becomes { color: var(--muted); font-size: 1.4em; margin: 2px 0; }
  math { font-size: 1.35em; max-width: 100%; }
  .prompt math { font-size: 1.7em; }
  /* the rewrite rule shown in the prompt */
  table.rule { margin: 14px auto 2px; border-collapse: collapse;
    font-variant-numeric: tabular-nums; }
  table.rule td { padding: 3px 8px; }
  table.rule td.mono { color: var(--muted); text-align: right; }
  table.rule td.arr { color: var(--muted); }
  table.rule math { font-size: 1.25em; }
  .prompt .rnote { color: var(--muted); font-size: 13px; margin-top: 8px; }
  button.choice .label { font-size: 18px; }
  .choices { display: flex; flex-direction: column; gap: 12px; }
  button.choice { display: flex; align-items: center; gap: 12px; width: 100%;
    min-height: 60px; padding: 12px 16px; text-align: left;
    background: var(--card); color: var(--ink); border: 1px solid var(--line);
    border-radius: 14px; font-size: 17px; cursor: pointer; transition: .12s; }
  button.choice:active { transform: scale(.99); }
  button.choice .tag { color: var(--accent); font-weight: 700; min-width: 22px; }
  button.choice.dead { opacity: .32; pointer-events: none; text-decoration: line-through;
    text-decoration-color: var(--bad); }
  button.choice.picked-good { border-color: var(--good); }
  .entry input { width: 100%; padding: 14px 16px; font-size: 18px; margin-bottom: 12px;
    background: var(--card); color: var(--ink); border: 1px solid var(--line); border-radius: 12px; }
  .entry .row { display: flex; gap: 12px; }
  .entry .row input { width: 100%; }
  .entry .adv { display: flex; align-items: flex-start; gap: 10px; color: var(--muted);
    font-size: 13.5px; margin: 4px 0 14px; cursor: pointer; }
  .entry .adv input { width: 18px; height: 18px; margin-top: 1px; flex: none; accent-color: var(--accent); }
  .entry .tiers { display: flex; flex-direction: column; gap: 8px; margin: 6px 0 16px; }
  .entry .tier { display: flex; align-items: flex-start; gap: 10px; color: var(--muted);
    font-size: 13.5px; cursor: pointer; }
  .entry .tier input { width: 18px; height: 18px; margin-top: 1px; flex: none; accent-color: var(--accent); }
  .entry .tier b { color: var(--ink); }
  .primary { width: 100%; min-height: 56px; font-size: 18px; font-weight: 600;
    background: var(--accent); color: #0a0e1c; border: none; border-radius: 12px; cursor: pointer; }
  .note { color: var(--muted); font-size: 13.5px; margin-top: 14px; }
  .end .stat { display: flex; justify-content: space-between; padding: 12px 4px;
    border-bottom: 1px solid var(--line); }
  .end .big { font-size: 64px; font-weight: 800; text-align: center; margin: 12px 0 4px;
    color: var(--good); font-variant-numeric: tabular-nums; }
  .showmore { margin-top: 18px; }
  .showmore button { width: 100%; min-height: 48px; font-size: 15px; font-weight: 600;
    background: transparent; color: var(--muted); border: 1px dashed var(--line);
    border-radius: 12px; cursor: pointer; }
  .showmore button:active { transform: scale(.99); }
  .reveal { margin-top: 14px; }
  .reveal .step { background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; overflow-x: auto; }
  .reveal .step.full { border-color: var(--accent); }
  .reveal .cap { color: var(--muted); font-size: 12.5px; text-transform: uppercase;
    letter-spacing: .6px; margin-bottom: 6px; }
  .reveal math { font-size: 1.15em; }
  /* the rewrite-rule table shown in a reveal */
  table.ftab { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  table.ftab th { color: var(--muted); font-size: 12px; text-transform: uppercase;
    letter-spacing: .5px; text-align: left; padding: 4px 10px; border-bottom: 1px solid var(--line); }
  table.ftab td { padding: 6px 10px; border-bottom: 1px solid var(--line); }
  table.ftab tr.match td { background: #1f2d22; color: var(--good); font-weight: 700; }
  table.ftab math { font-size: 1.05em; }
  .reveal .tnote { color: var(--muted); font-size: 13px; margin-top: 8px; }
  /* dormant first-move follow-up machinery (unused in flashpoly v1) */
  .fm-q { background: var(--card); border: 1px solid var(--accent); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 16px; }
  .fm-q .ok { color: var(--good); font-weight: 700; font-size: 14px; }
  .fm-q .q { display: block; margin-top: 4px; font-size: 17px; font-weight: 600; }
  code { background: #00000033; padding: 1px 6px; border-radius: 6px; color: var(--ink); }
</style>
</head>

div><div class=\"polyline\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"inline\"><mrow><mn>14</mn><mo>+</mo><mrow><mn>8</mn><mo>&#183;</mo><mi>e</mi></mrow></mrow></math></div>","choices":[{"correct":false,"elim":1,"text":"Heisenberg"},{"correct":true,"elim":null,"text":"Quaternion"},{"correct":false,"elim":0,"text":"Weyl"},{"correct":false,"elim":2,"text":"Stem-cell"}],"reveal":{"setup":["<math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"inline\"><mtext>Apply each rule and see which one lands on this result.</mtext></math>",{"type":"table","rows":[{"cells":["x·x","&#8594;","<math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"inline\"><mn>-1</mn></math>"]},{"cells":["x·y","&#8594;","<math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"inline\"><mi>e</mi></math>"]},{"cells":["y·x","&#8594;","<math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"inline\"><mrow><mo>-</mo><mi>e</mi></mrow></math>"]},{"cells":["y·y","&#8594;","<math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"inline\"><mn>-1</mn></math>"]}],"note":"like Clifford but x²=y²=−1"}],"full":["<math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"inline\"><mtext>This is the Quaternion rule.</mtext></math>","<math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"inline\"><mrow><mn>14</mn><mo>+</mo><mrow><mn>8</mn><mo>&#183;</mo><mi>e</mi></mrow></mrow></math>"]}},{"id":4244650897,"family":"plug","difficulty":1,"prompt":"<div class=\"stem\">Substitute with the rule (don't collect yet):</div><div class=\"polyline\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><mrow><mrow><mo>(</mo><mo>-</mo><mn>2</mn><mi>x</mi><mo>-</mo><mn>3</mn><mo>)</mo></mrow><mrow><mo>(</mo><mn>4</mn><mi>x</mi><mo>+</mo><mn>2</mn><mo>)</mo></mrow></mrow></math></div><table class=\"rule\"><tr><td class=\"mono\">x·x</td><td class=\"arr\">&#8594;</td><td><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"inline\"><mn>1</mn></math></td></ const BLUEPRINT = {"id":"poly-fall2026-v1","basic":{"id":"poly-fall2026-v1","total":24,"quotas":[{"family":"plug","difficulty":1,"n":8},{"family":"reduce","difficulty":1,"n":8},{"family":"name_table","difficulty":1,"n":6},{"family":"name_entries","difficulty":1,"n":2}]},"advanced":{"id":"poly-fall2026-v1-adv","total":40,"quotas":[{"family":"plug","difficulty":1,"n":8},{"family":"reduce","difficulty":1,"n":8},{"family":"name_table","difficulty":1,"n":6},{"family":"name_entries","difficulty":1,"n":2},{"family":"plug","difficulty":2,"n":5},{"family":"reduce","difficulty":2,"n":5},{"family":"name_table","difficulty":2,"n":4},{"family":"name_entries","difficulty":2,"n":2}]},"vadv":{"id":"poly-fall2026-v1-vadv","total":56,"quotas":[{"family":"plug","difficulty":1,"n":8},{"family":"reduce","difficulty":1,"n":8},{"family":"name_table","difficulty":1,"n":6},{"family":"name_entries","difficulty":1,"n":2},{"family":"plug","difficulty":2,"n":5},{"family":"reduce","difficulty":2,"n":5},{"family":"name_table","difficulty":2,"n":4},{"family":"name_entries","difficulty":2,"n":2},{"family":"plug","difficulty":3,"n":5},{"family":"reduce","difficulty":3,"n":5},{"family":"name_table","difficulty":3,"n":4},{"family":"name_entries","difficulty":3,"n":2}]}};

const CARD_BY_ID = new Map(BANK.cards.map(c => [c.id, c]));
// Each tier's quiz length is its blueprint total; it's also the default goal.
// The page exposes three nested tiers: basic < advanced < vadv.
function planFor(tier) { return BLUEPRINT[tier] || BLUEPRINT.basic; }

// ---- deterministic PRNG: xmur3 seed -> sfc32 stream (int32 only) ------------
function xmur3(str) {
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function () {
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return h >>> 0;
  };
}
function sfc32(a, b, c, d) {
  return function () {
    a |= 0; b |= 0; c |= 0; d |= 0;
    let t = (a + b | 0) + d | 0;
    d = d + 1 | 0;
    a = b ^ (b >>> 9);
    b = c + (c << 3) | 0;
    c = (c << 21) | (c >>> 11);
    c = c + t | 0;
    return (t >>> 0) / 4294967296;
  };
}
function makeRng(word) {
  const seed = xmur3(word.trim().toLowerCase().normalize("NFC"));
  const rng = sfc32(seed(), seed(), seed(), seed());
  for (let i = 0; i < 15; i++) rng();   // fixed warm-up discard
  return rng;
}
function sampleWithoutReplacement(rng, arr, k) {
  const a = arr.slice(), out = [];
  for (let i = 0; i < k && i < a.length; i++) {
    const j = i + Math.floor(rng() * (a.length - i));
    [a[i], a[j]] = [a[j], a[i]];
    out.push(a[i]);
  }
  return out;
}
function shuffleInPlace(rng, a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

// ---- quiz assembly: word -> fixed cards (tier picks the blueprint) ---------
// Draws a spread per the blueprint, then shuffles the whole id list so the four
// directions interleave in random order -- no ascending ramp, no block ordering.
function buildQuiz(word, tier) {
  const rng = makeRng(word);
  const ids = [];
  for (const q of planFor(tier).quotas) {
    const pool = BANK.strata_index[q.family + ":" + q.difficulty] || [];
    for (const id of sampleWithoutReplacement(rng, pool, q.n)) ids.push(id);
  }
  shuffleInPlace(rng, ids);
  return ids.map(id => CARD_BY_ID.get(id)).filter(Boolean);
}

// ---- app state -------------------------------------------------------------
const app = document.getElementById("app");
let S = null;

function h(html) { app.innerHTML = html; }

function screenEntry() {
  S = null;
  h(`
    <h1>flashpoly</h1>
    <div class="sub">One expansion, many algebras &mdash; term ${escapeHtml(BANK.term)}</div>
    <div class="entry">
      <label class="note">Type a word. The same word always makes the same quiz.</label>
      <div class="row">
        <input id="word" placeholder="e.g. zebra" autocomplete="off" autocapitalize="off" spellcheck="false">
        <input id="goal" placeholder="#" inputmode="numeric" style="max-width:84px">
      </div>
      <div class="tiers" id="tiers">
        <label class="tier"><input type="radio" name="tier" value="basic" checked>
          <span><b>Basic</b> &mdash; single variable (ax+b)(cx+d): polynomial,
          idempotent, split, dual, imaginary</span></label>
        <label class="tier"><input type="radio" name="tier" value="advanced">
          <span><b>Advanced</b> &mdash; two variables (ax+by)(cx+dy): the geometric
          family (dot, wedge, Clifford)</span></label>
        <label class="tier"><input type="radio" name="tier" value="vadv">
          <span><b>Very advanced</b> &mdash; the exotic specimens (quaternion,
          Heisenberg, Weyl, stem-cell)</span></label>
      </div>
      <button class="primary" id="go">Start</button>
      <div class="note">The number is your goal &mdash; how many you want to get right before
        you&rsquo;re done. Leave it blank to go for the whole set.</div>
    </div>
  `);
  const start = () => {
    const word = document.getElementById("word").value.trim();
    if (!word) return;
    const checked = document.querySelector('input[name="tier"]:checked');
    const tier = checked ? checked.value : "basic";
    const fullSet = planFor(tier).total;
    const goalRaw = parseInt(document.getElementById("goal").value, 10);
    startQuiz(word, Number.isFinite(goalRaw) ? goalRaw : fullSet, tier);
  };
  document.getElementById("go").onclick = start;
  document.getElementById("word").addEventListener("keydown", e => { if (e.key === "Enter") start(); });
  document.getElementById("goal").addEventListener("keydown", e => { if (e.key === "Enter") start(); });
}

function startQuiz(word, goal, tier) {
  const quiz = buildQuiz(word, tier);
  goal = Math.min(Math.max(goal, 1), quiz.length);
  S = { word, quiz, goal, tier, index: 0, right: 0, currentMiss: 0,
        eliminated: new Set(), revealLevel: 0, phase: "technique" };
  renderQuestion();
}

// The displayed choices for the current step: the main choices, or -- once a
// card is named and carries a "first move" -- its setup options.
function activeChoices(card) {
  return (S.phase === "firstmove" && card.firstMove) ? card.firstMove.choices : card.choices;
}

function renderQuestion() {
  const card = S.quiz[S.index];
  const inFirst = S.phase === "firstmove" && !!card.firstMove;
  const choices = activeChoices(card);
  const tags = ["A", "B", "C", "D"];
  const rows = choices.map((c, i) => {
    const dead = S.eliminated.has(i) ? " dead" : "";
    // technique / first-move text choices carry a label; recall + math choices carry MathML
    const body = c.text != null
      ? `<span class="label">${escapeHtml(c.text)}</span>`
      : c.mathml;
    return `<button class="choice${dead}" data-i="${i}">
              <span class="tag">${tags[i]}</span><span class="body">${body}</span>
            </button>`;
  }).join("");
  let pips = "";
  for (let i = 0; i < S.goal; i++) pips += `<span class="pip${i < S.right ? " on" : ""}"></span>`;
  // once the approach is named, restate it and pose the "which rewrite?" follow-up
  let firstMoveQ = "";
  if (inFirst) {
    const technique = (card.choices.find(c => c.correct) || {}).text || "";
    firstMoveQ = `<div class="fm-q"><span class="ok">&#10003; ${escapeHtml(technique)}</span>` +
                 `<span class="q">${escapeHtml(card.firstMove.question)}</span></div>`;
  }
  h(`
    <div class="hdr"><span>${escapeHtml(S.word)}</span>
      <span class="score">&#10003; ${S.right}</span></div>
    <div class="pips">${pips}</div>
    <div class="prompt">${card.prompt}</div>
    ${firstMoveQ}
    <div class="choices">${rows}</div>
    <div class="showmore" id="showmore"></div>
    <div class="reveal" id="reveal"></div>
  `);
  app.querySelectorAll("button.choice").forEach(b => {
    b.onclick = () => onPick(parseInt(b.dataset.i, 10));
  });
  renderReveal();
}

// ---- progressive-disclosure hint ladder ------------------------------------
// A reveal step is either a MathML string or a structured table node
// ({type:"table", headers, rows:[{cells:[mathml...], match}], note}).
function renderTable(t) {
  let html = '<table class="ftab">';
  if (t.headers)
    html += "<tr>" + t.headers.map(x => `<th>${escapeHtml(x)}</th>`).join("") + "</tr>";
  for (const r of t.rows)
    html += `<tr class="${r.match ? "match" : ""}">`
          + r.cells.map(c => `<td>${c}</td>`).join("") + "</tr>";
  html += "</table>";
  if (t.note) html += `<div class="tnote">${escapeHtml(t.note)}</div>`;
  return html;
}
function renderStep(m, extra) {
  const inner = (typeof m === "string") ? m : renderTable(m);
  return `<div class="step${extra || ""}">${inner}</div>`;
}
function renderReveal() {
  const card = S.quiz[S.index];
  const moreEl = document.getElementById("showmore");
  const revEl = document.getElementById("reveal");
  if (!card.reveal) return;            // recall cards without a ladder
  const steps = [];
  if (S.revealLevel >= 1)
    steps.push(`<div class="cap">How to find it</div>` +
               card.reveal.setup.map(m => renderStep(m, "")).join(""));
  if (S.revealLevel >= 2)
    steps.push(`<div class="cap">Answer</div>` +
               card.reveal.full.map(m => renderStep(m, " full")).join(""));
  revEl.innerHTML = steps.join("");
  if (S.revealLevel >= 2) { moreEl.innerHTML = ""; return; }
  const label = S.revealLevel === 0 ? "Show me how" : "Show the answer";
  moreEl.innerHTML = `<button id="more">${label}</button>`;
  document.getElementById("more").onclick = () => { S.revealLevel += 1; renderReveal(); };
}

function onPick(i) {
  if (S.eliminated.has(i)) return;
  const card = S.quiz[S.index];
  const inFirst = S.phase === "firstmove" && !!card.firstMove;
  const choices = activeChoices(card);
  const choice = choices[i];
  if (choice.correct) {
    if (inFirst) { advance(); return; }      // first move is an untracked teaching beat
    if (S.currentMiss === 0) S.right += 1;    // only first-try answers score
    enterFirstMoveOrAdvance(card);            // named the approach -> now "which rewrite?"
    return;
  }
  // wrong pick: eliminate it...
  S.eliminated.add(i);
  if (S.currentMiss === 0) {
    // ...and one other distractor (lowest elim rank still alive), leaving 2.
    const other = choices
      .map((c, idx) => ({ c, idx }))
      .filter(o => !o.c.correct && !S.eliminated.has(o.idx))
      .sort((a, b) => a.c.elim - b.c.elim)[0];
    if (other) S.eliminated.add(other.idx);
    S.currentMiss = 1;
  } else {
    // second miss: only the correct answer remains, forced.
    S.currentMiss = 2;
  }
  renderQuestion();
}

// After a technique card is named correctly: if it carries a first-move follow-up,
// step into it (same 4->2->1 feel, but untracked); otherwise advance.
function enterFirstMoveOrAdvance(card) {
  if (!card.firstMove) { advance(); return; }
  S.phase = "firstmove";
  S.currentMiss = 0;
  S.eliminated = new Set();
  S.revealLevel = 0;
  renderQuestion();
}

function advance() {
  if (S.right >= S.goal) { screenEnd("goal"); return; }   // hit the target
  S.index += 1;
  if (S.index >= S.quiz.length) { screenEnd("exhausted"); return; }
  S.currentMiss = 0;
  S.eliminated = new Set();
  S.revealLevel = 0;
  S.phase = "technique";
  renderQuestion();
}

function screenEnd(reason) {
  const hit = reason === "goal";
  const headline = hit ? "Goal reached!" : "Out of cards";
  const sub = hit
    ? `${escapeHtml(S.word)} &mdash; you got ${S.right} right`
    : `${escapeHtml(S.word)} &mdash; ${S.right} right of a ${S.goal} goal`;
  h(`
    <h1>${headline}</h1>
    <div class="sub">${sub}</div>
    <div class="end">
      <div class="big">${S.right}</div>
      <div class="sub" style="text-align:center">first-try correct</div>
    </div>
    <div class="note">Run <code>${escapeHtml(S.word)}</code> again any time for the exact same quiz, or try a new word.</div>
    <button class="primary" id="again" style="margin-top:18px">New quiz</button>
  `);
  document.getElementById("again").onclick = screenEntry;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

screenEntry();
